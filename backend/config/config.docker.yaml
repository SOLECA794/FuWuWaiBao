server:
  port: 18080
  mode: release
  read_timeout: 30s
  write_timeout: 30s

database:
  driver: postgres
  host: postgres
  port: 5432
  user: postgres
  password: 123456
  dbname: teaching
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 50

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 10

oss:
  provider: minio
  endpoint: minio:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: teaching
  use_ssl: false

ai:
  provider: openai-compatible
  base_url: http://host.docker.internal:8000
  api_key: ""
  model: qwen-plus
  timeout: 30s

log:
  level: info
  filename: logs/app.log
  max_size: 100
  max_backups: 3
  max_age: 30
