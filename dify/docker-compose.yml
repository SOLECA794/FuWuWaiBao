services:
  dify-postgres:
    image: postgres:15
    container_name: dify-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dify}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dify123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dify}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-redis:
    image: redis:7
    container_name: dify-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-dify123456}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-api:
    image: langgenius/dify-api:latest
    container_name: dify-api
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-dify}
      DB_PASSWORD: ${DB_PASSWORD:-dify123456}
      DB_HOST: dify-postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dify123456}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-dify123456}@dify-redis:6379/1
      CELERY_BACKEND: redis
      SECRET_KEY: ${DIFY_SECRET_KEY:-replace-with-strong-secret-key}
      LOG_LEVEL: INFO
      CONSOLE_API_URL: http://localhost:${DIFY_API_PORT:-18001}
      SERVICE_API_URL: http://localhost:${DIFY_API_PORT:-18001}
      APP_API_URL: http://localhost:${DIFY_API_PORT:-18001}
      VECTOR_STORE: qdrant
      QDRANT_URL: http://dify-qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-difyai123456}
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY}
      CONSOLE_CORS_ALLOW_ORIGINS: http://localhost:${DIFY_WEB_PORT:-13000}
      WEB_API_CORS_ALLOW_ORIGINS: http://localhost:${DIFY_WEB_PORT:-13000}
      APP_API_CORS_ALLOW_ORIGINS: http://localhost:${DIFY_WEB_PORT:-13000}
    ports:
      - "${DIFY_API_PORT:-18001}:5001"
    depends_on:
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/api/storage
      - ./logs:/app/logs

  dify-worker:
    image: langgenius/dify-api:latest
    container_name: dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      DB_USERNAME: ${DB_USERNAME:-dify}
      DB_PASSWORD: ${DB_PASSWORD:-dify123456}
      DB_HOST: dify-postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dify123456}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-dify123456}@dify-redis:6379/1
      CELERY_BACKEND: redis
      SECRET_KEY: ${DIFY_SECRET_KEY:-replace-with-strong-secret-key}
      LOG_LEVEL: INFO
      VECTOR_STORE: qdrant
      QDRANT_URL: http://dify-qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-difyai123456}
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY}
    depends_on:
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
      dify-api:
        condition: service_started
    volumes:
      - ./storage:/app/api/storage
      - ./logs:/app/logs

  dify-web:
    image: langgenius/dify-web:latest
    container_name: dify-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${DIFY_API_PORT:-18001}
      CONSOLE_API_URL: http://localhost:${DIFY_API_PORT:-18001}
      APP_API_URL: http://localhost:${DIFY_API_PORT:-18001}
    ports:
      - "${DIFY_WEB_PORT:-13000}:3000"
    depends_on:
      - dify-api

  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: dify-plugin-daemon
    restart: unless-stopped
    environment:
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      DB_TYPE: postgresql
      DB_HOST: dify-postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      DB_USERNAME: ${DB_USERNAME:-dify}
      DB_PASSWORD: ${DB_PASSWORD:-dify123456}
      DB_SSL_MODE: disable
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dify123456}
      REDIS_USE_SSL: false
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: false
    ports:
      - "5003:5003"
    depends_on:
      dify-postgres:
        condition: service_healthy
      dify-api:
        condition: service_started
    volumes:
      - ./plugin_daemon:/app/storage

  dify-qdrant:
    image: langgenius/qdrant:v1.8.3
    container_name: dify-qdrant
    restart: unless-stopped
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-difyai123456}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
