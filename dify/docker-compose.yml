version: '3.8'

services:
  dify-postgres:
    image: postgres:15
    container_name: dify-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-dify}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dify123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dify}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-redis:
    image: redis:7
    container_name: dify-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-dify123456}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dify-api:
    image: langgenius/dify-api:0.13.3
    container_name: dify-api
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-dify}
      DB_PASSWORD: ${DB_PASSWORD:-dify123456}
      DB_HOST: dify-postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dify123456}
      REDIS_DB: 0
      SECRET_KEY: ${DIFY_SECRET_KEY:-replace-with-strong-secret-key}
      LOG_LEVEL: INFO
    ports:
      - "${DIFY_API_PORT:-18001}:5001"
    depends_on:
      dify-postgres:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs

  dify-web:
    image: langgenius/dify-web:0.13.3
    container_name: dify-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${DIFY_API_PORT:-18001}
    ports:
      - "${DIFY_WEB_PORT:-13000}:3000"
    depends_on:
      - dify-api

volumes:
  postgres_data:
  redis_data:
