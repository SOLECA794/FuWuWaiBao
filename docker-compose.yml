version: '3.8'

services:
  app:
    build: .
    container_name: teaching-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - teaching-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: teaching-postgres
    environment:
      POSTGRES_DB: teaching
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - teaching-network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: teaching-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - teaching-network
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: teaching-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - teaching-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  teaching-network:
    driver: bridge
